name: CI_action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.14.x]
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: cd worksheet2/my-nest-app && npm install

      - name: Run the tests
        run: cd worksheet2/my-nest-app && npm test

      - name: Build
        run: cd worksheet2/my-nest-app && npm run build
          
